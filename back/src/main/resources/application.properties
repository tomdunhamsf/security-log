# ── Server ─────────────────────────────────────────────────────────────────
server.port=8080

# HTTPS with self-signed keystore generated at build time by keytool-maven-plugin
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=securitylog

# ── Database ────────────────────────────────────────────────────────────────
# Override with DB_URL / DB_USER / DB_PASSWORD environment variables at runtime
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/securitylog}
spring.datasource.username=${DB_USER:securitylog}
spring.datasource.password=${DB_PASSWORD:securitylog}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── File upload ─────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── JWT ─────────────────────────────────────────────────────────────────────
# Secret MUST be a Base64-encoded string of at least 256 bits (32 bytes).
# Override with JWT_SECRET env var in production.
jwt.secret=${JWT_SECRET:c2VjdXJpdHlsb2ctZGV2LXNlY3JldC0yMDI0LWRvLW5vdC11c2UtaW4tcHJvZHVjdGlvbg==}
# 8 hours in milliseconds
jwt.expiration-ms=28800000
