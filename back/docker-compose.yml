services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: securitylog
      POSTGRES_USER: securitylog
      POSTGRES_PASSWORD: securitylog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securitylog -d securitylog"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/securitylog
      DB_USER: securitylog
      DB_PASSWORD: securitylog
      # IMPORTANT: replace with a strong Base64-encoded secret (≥32 bytes) before deploying
      JWT_SECRET: c2VjdXJpdHlsb2ctZGV2LXNlY3JldC0yMDI0LWRvLW5vdC11c2UtaW4tcHJvZHVjdGlvbg==
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
